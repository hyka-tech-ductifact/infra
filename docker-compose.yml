name: ductifact-${ENV}

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ductifact_${ENV}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend API ────────────────────────────────────────────
  app:
    image: ${APP_IMAGE}
    container_name: ductifact_${ENV}_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT}:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - APP_PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
      - GIN_MODE=${GIN_MODE}
      - AUTO_MIGRATE=${AUTO_MIGRATE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - internal

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: ductifact_${ENV}_prometheus
    restart: unless-stopped
    ports:
      - "127.0.0.1:${PROMETHEUS_PORT}:9090"
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}"
    networks:
      - internal

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: ductifact_${ENV}_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal

volumes:
  postgres_data:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
