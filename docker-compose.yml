name: ductifact-${ENV}

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine@sha256:df7bca0066e6f60cc3dd32faa70caddec20e2c22b58932f79498e5704b23854a
    container_name: ductifact_${ENV}_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── MinIO (S3-compatible object storage) ───────────────────
  minio:
    image: minio/minio:RELEASE.2025-04-08T15-41-24Z@sha256:79f5beef4fe27220c1b55fe8d38a4dc88544870891b871bea6fe113b90256297
    container_name: ductifact_${ENV}_minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD}
    ports:
      - "127.0.0.1:${MINIO_CONSOLE_PORT}:9001"
    volumes:
      - minio_data:/data
    healthcheck:
      test: [ "CMD-SHELL", "mc ready local || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s
    networks:
      - internal

  # ── Redis ──────────────────────────────────────────────────
  redis:
    image: redis:7-alpine@sha256:6ab0b6e7381779332f97b8ca76193e45b0756f38d4c0dcda72dbb3c32061ab99
    container_name: ductifact_${ENV}_redis
    restart: unless-stopped
    command: redis-server --requirepass "${REDIS_PASSWORD}"
    volumes:
      - redis_data:/data
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - internal

  # ── Backend API ────────────────────────────────────────────
  backend:
    image: ${BACKEND_IMAGE}
    container_name: ductifact_${ENV}_backend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${BACKEND_PORT}:8080"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - BACKEND_HOST=${BACKEND_HOST}
      - BACKEND_PORT=8080
      - JWT_SECRET=${JWT_SECRET}
      - JWT_TOKEN_DURATION=${JWT_TOKEN_DURATION}
      - JWT_REFRESH_TOKEN_DURATION=${JWT_REFRESH_TOKEN_DURATION}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
      - GIN_MODE=${GIN_MODE}
      - RATE_LIMIT_IP_MAX=${RATE_LIMIT_IP_MAX}
      - RATE_LIMIT_IP_WINDOW=${RATE_LIMIT_IP_WINDOW}
      - RATE_LIMIT_USER_MAX=${RATE_LIMIT_USER_MAX}
      - RATE_LIMIT_USER_WINDOW=${RATE_LIMIT_USER_WINDOW}
      - LOGIN_THROTTLE_MAX_ATTEMPTS=${LOGIN_THROTTLE_MAX_ATTEMPTS}
      - LOGIN_THROTTLE_WINDOW=${LOGIN_THROTTLE_WINDOW}
      - LOGIN_THROTTLE_LOCKOUT=${LOGIN_THROTTLE_LOCKOUT}
      - MINIO_HOST=minio
      - MINIO_API_PORT=9000
      - MINIO_ROOT_USER=${MINIO_ROOT_USER}
      - MINIO_ROOT_PASSWORD=${MINIO_ROOT_PASSWORD}
      - MINIO_BUCKET=${MINIO_BUCKET}
      - MINIO_USE_SSL=false
      - SMTP_HOST=${SMTP_HOST}
      - SMTP_PORT=${SMTP_PORT}
      - SMTP_AUTH=${SMTP_AUTH}
      - SMTP_USERNAME=${SMTP_USERNAME}
      - SMTP_PASSWORD=${SMTP_PASSWORD}
      - SMTP_FROM=${SMTP_FROM}
      - VERIFICATION_BASE_URL=${VERIFICATION_BASE_URL}
      - VERIFICATION_EMAIL_TOKEN_TTL=${VERIFICATION_EMAIL_TOKEN_TTL}
      - VERIFICATION_PASSWORD_RESET_TOKEN_TTL=${VERIFICATION_PASSWORD_RESET_TOKEN_TTL}
      - REDIS_HOST=redis
      - REDIS_PORT=6379
      - REDIS_AUTH=true
      - REDIS_PASSWORD=${REDIS_PASSWORD}
      - REDIS_DB=${REDIS_DB}
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - internal

  # ── Frontend (Angular + Nginx) ─────────────────────────────
  frontend:
    image: ${FRONTEND_IMAGE}
    container_name: ductifact_${ENV}_frontend
    restart: unless-stopped
    ports:
      - "127.0.0.1:${FRONTEND_PORT}:8080"
    depends_on:
      - backend
    healthcheck:
      test: ["CMD-SHELL", "curl -f http://localhost:8080 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
    networks:
      - internal

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.0@sha256:339ce86a59413be18d0e445472891d022725b4803fab609069110205e79fb2f1
    container_name: ductifact_${ENV}_prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=${PROMETHEUS_RETENTION}"
    networks:
      - internal

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0@sha256:62d2b9d20a19714ebfe48d1bb405086081bc602aa053e28cf6d73c7537640dfb
    container_name: ductifact_${ENV}_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:${GRAFANA_PORT}:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - internal

volumes:
  postgres_data:
  minio_data:
  redis_data:
  prometheus_data:
  grafana_data:

networks:
  internal:
    driver: bridge
