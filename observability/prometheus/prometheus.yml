global:
  scrape_interval: 15s
  evaluation_interval: 15s

rule_files:
  - "alerts.yml"

scrape_configs:
  # ── Ductifact API ──────────────────────────────────────
  - job_name: "ductifact-api"
    metrics_path: /metrics
    static_configs:
      - targets: ["app:8080"]
        labels:
          environment: "development"

  # ── Prometheus self-monitoring ─────────────────────────
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]
