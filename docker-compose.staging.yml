name: ductifact-staging

services:
  # ── PostgreSQL (staging) ───────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ductifact_staging_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - staging_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - staging_internal

  # ── Backend API (staging) ──────────────────────────────────
  app:
    image: ghcr.io/${GITHUB_REPO}:staging
    container_name: ductifact_staging_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT}:${APP_PORT}"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - APP_PORT=${APP_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
      - GIN_MODE=${GIN_MODE}
      - AUTO_MIGRATE=${AUTO_MIGRATE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - staging_internal

  # ── Prometheus (staging) ───────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: ductifact_staging_prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.staging.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - staging_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=15d"
    networks:
      - staging_internal

  # ── Grafana (staging) ──────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: ductifact_staging_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3001:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - staging_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - staging_internal

volumes:
  staging_postgres_data:
  staging_prometheus_data:
  staging_grafana_data:

networks:
  staging_internal:
    driver: bridge
