name: Deploy Staging

# ─── Triggered by backend/frontend repos after building an image ───
# Opens a PR to update staging manifest; deploy runs after merge to main.
on:
  repository_dispatch:
    types: [image-published]

  push:
    branches: [main]
    paths:
      - "environments/staging.manifest.env"

jobs:
  propose-staging-update:
    name: Propose Staging Manifest Update
    runs-on: ubuntu-latest
    if: github.event_name == 'repository_dispatch'
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Update staging manifest
        run: |
          SERVICE="${{ github.event.client_payload.service }}"
          IMAGE="${{ github.event.client_payload.image }}"
          MANIFEST="environments/staging.manifest.env"

          echo "Updating $SERVICE to $IMAGE in $MANIFEST"

          if [[ "$SERVICE" == "backend" ]]; then
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${IMAGE}|" "$MANIFEST"
          elif [[ "$SERVICE" == "frontend" ]]; then
            sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=${IMAGE}|" "$MANIFEST"
          else
            echo "ERROR: Unknown service '$SERVICE'"
            exit 1
          fi

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: "staging(${{ github.event.client_payload.service }}): sha-${{ github.event.client_payload.sha }}"
          branch: "staging/${{ github.event.client_payload.service }}-${{ github.event.client_payload.sha }}"
          delete-branch: true
          title: "🚀 Update staging manifest for ${{ github.event.client_payload.service }}"
          body: |
            ## Staging Manifest Update

            | Field | Value |
            |-------|-------|
            | Service | `${{ github.event.client_payload.service }}` |
            | Image | `${{ github.event.client_payload.image }}` |
            | SHA | `${{ github.event.client_payload.sha }}` |
            | Source repo | `${{ github.event.client_payload.repository }}` |

            Merging this PR triggers staging deploy via `cd-staging.yml`.
          labels: |
            staging
            automated

      - name: Enable PR auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash

  deploy-staging:
    name: Deploy to Staging
    runs-on: ubuntu-latest
    if: github.event_name == 'push'

    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      # ── Deploy via SSH through Cloudflare Tunnel ───────────
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Deploy to staging server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o "ProxyCommand=cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
              -i ~/.ssh/deploy_key \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "cd ~/ductifact/infra && git pull --ff-only origin main && ./scripts/deploy.sh staging"
