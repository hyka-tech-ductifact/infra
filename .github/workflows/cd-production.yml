name: CD — Deploy to Production

# ─── When it runs ────────────────────────────────────────────
# 1. Automatically when production manifest changes on main (after PR merge)
# 2. Manually via workflow_dispatch (emergency or re-deploy)
on:
  push:
    branches: [main]
    paths:
      - "environments/production.manifest.env"

  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'deploy' to confirm production deployment"
        required: true
        type: string
      version:
        description: "Optional release version (example: v0.5.0 or 0.5.0). Empty = auto bump patch."
        required: false
        type: string

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy-production:
    name: Deploy to Production
    runs-on: ubuntu-latest
    permissions:
      contents: write

    # For workflow_dispatch, require explicit confirmation
    if: >-
      github.event_name == 'push' ||
      (github.event_name == 'workflow_dispatch' && github.event.inputs.confirm == 'deploy')

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read manifest
        id: manifest
        run: |
          BACKEND_IMAGE=$(grep -E '^BACKEND_IMAGE=' environments/production.manifest.env | cut -d'=' -f2-)
          FRONTEND_IMAGE=$(grep -E '^FRONTEND_IMAGE=' environments/production.manifest.env | cut -d'=' -f2-)
          echo "BACKEND_IMAGE=$BACKEND_IMAGE" >> $GITHUB_OUTPUT
          echo "FRONTEND_IMAGE=$FRONTEND_IMAGE" >> $GITHUB_OUTPUT
          echo "## 🚀 Production Deploy" >> $GITHUB_STEP_SUMMARY
          echo "| Service | Image |" >> $GITHUB_STEP_SUMMARY
          echo "|---------|-------|" >> $GITHUB_STEP_SUMMARY
          echo "| Backend | \`$BACKEND_IMAGE\` |" >> $GITHUB_STEP_SUMMARY
          echo "| Frontend | \`$FRONTEND_IMAGE\` |" >> $GITHUB_STEP_SUMMARY

      - name: Resolve release version
        id: release_version
        run: |
          set -euo pipefail

          INPUT_VERSION="${{ github.event.inputs.version || '' }}"

          normalize_version() {
            local value="$1"
            value="${value#v}"
            if [[ "$value" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
              echo "v${value}"
            else
              echo ""
            fi
          }

          if [[ -n "$INPUT_VERSION" ]]; then
            VERSION="$(normalize_version "$INPUT_VERSION")"
            if [[ -z "$VERSION" ]]; then
              echo "ERROR: invalid version format '$INPUT_VERSION'. Use SemVer, e.g. v0.5.0 or 0.5.0"
              exit 1
            fi
          else
            git fetch --tags --force
            LATEST_TAG="$(git tag -l 'v*' --sort=-version:refname | head -n 1)"

            if [[ -z "$LATEST_TAG" ]]; then
              VERSION="v0.1.0"
            else
              BASE="${LATEST_TAG#v}"
              if [[ ! "$BASE" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
                echo "ERROR: latest tag '$LATEST_TAG' is not SemVer"
                exit 1
              fi
              IFS='.' read -r major minor patch <<< "$BASE"
              patch=$((patch + 1))
              VERSION="v${major}.${minor}.${patch}"
            fi
          fi

          if git show-ref --tags --verify --quiet "refs/tags/$VERSION"; then
            echo "ERROR: tag '$VERSION' already exists"
            exit 1
          fi

          echo "version=$VERSION" >> "$GITHUB_OUTPUT"
          echo "RELEASE_VERSION=$VERSION" >> "$GITHUB_ENV"
          echo "Release version: $VERSION"

      - name: Verify images exist in registry
        run: |
          echo "Verifying backend image..."
          docker manifest inspect ${{ steps.manifest.outputs.BACKEND_IMAGE }} > /dev/null 2>&1 || {
            echo "ERROR: Backend image not found: ${{ steps.manifest.outputs.BACKEND_IMAGE }}"
            exit 1
          }
          echo "✅ Backend image exists"

          echo "Verifying frontend image..."
          docker manifest inspect ${{ steps.manifest.outputs.FRONTEND_IMAGE }} > /dev/null 2>&1 || {
            echo "ERROR: Frontend image not found: ${{ steps.manifest.outputs.FRONTEND_IMAGE }}"
            exit 1
          }
          echo "✅ Frontend image exists"
        env:
          DOCKER_CLI_EXPERIMENTAL: enabled

      # ── Deploy via SSH through Cloudflare Tunnel ───────────
      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Deploy to production server
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          ssh -v -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o "ProxyCommand=cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
              -i ~/.ssh/deploy_key \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "cd ~/ductifact/infra && git pull --ff-only origin main && ./scripts/deploy.sh prod"

      - name: Deploy summary
        if: success()
        run: |
          echo "### ✅ Production deploy successful!" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Release: \`${{ steps.release_version.outputs.version }}\`" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Deployed at: $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY

      - name: Create release tag
        if: success()
        run: |
          set -euo pipefail
          VERSION="${{ steps.release_version.outputs.version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Production release $VERSION"
          git push origin "$VERSION"

      - name: Publish GitHub release
        if: success()
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VERSION="${{ steps.release_version.outputs.version }}"
          DEPLOYED_AT="$(date -u '+%Y-%m-%d %H:%M UTC')"

          cat > /tmp/release-notes.md <<EOF
          ## Production Deployment

          - Release: ${VERSION}
          - Environment: production
          - Deployed at: ${DEPLOYED_AT}
          - Commit: ${GITHUB_SHA}

          ### Application Images

          - Backend: ${{ steps.manifest.outputs.BACKEND_IMAGE }}
          - Frontend: ${{ steps.manifest.outputs.FRONTEND_IMAGE }}

          ### Source of Truth

          - Manifest: environments/production.manifest.env
          - Compose: docker-compose.yml
          EOF

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md
