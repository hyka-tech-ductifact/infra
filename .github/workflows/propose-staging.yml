name: Propose Staging Update

on:
  repository_dispatch:
    types: [image-published]

jobs:
  propose-staging-update:
    name: Propose Staging Manifest Update
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write

    steps:
      - uses: actions/checkout@v4

      - name: Update staging manifest
        run: |
          set -euo pipefail

          SERVICE="${{ github.event.client_payload.service }}"
          IMAGE="${{ github.event.client_payload.image }}"
          MANIFEST="environments/staging.manifest.env"

          echo "Updating $SERVICE to $IMAGE in $MANIFEST"

          if [[ "$SERVICE" == "backend" ]]; then
            sed -i "s|^BACKEND_IMAGE=.*|BACKEND_IMAGE=${IMAGE}|" "$MANIFEST"
          elif [[ "$SERVICE" == "frontend" ]]; then
            sed -i "s|^FRONTEND_IMAGE=.*|FRONTEND_IMAGE=${IMAGE}|" "$MANIFEST"
          else
            echo "ERROR: Unknown service '$SERVICE'"
            exit 1
          fi

      - name: Create Pull Request
        id: cpr
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.INFRA_PAT }}
          commit-message: "staging(${{ github.event.client_payload.service }}): sha-${{ github.event.client_payload.sha }}"
          branch: "deploy/staging/${{ github.event.client_payload.service }}-${{ github.event.client_payload.sha }}"
          delete-branch: true
          title: "🚀 Update staging manifest for ${{ github.event.client_payload.service }}"
          body: |
            ## Staging Manifest Update

            | Field | Value |
            |-------|-------|
            | Service | `${{ github.event.client_payload.service }}` |
            | Image | `${{ github.event.client_payload.image }}` |
            | SHA | `${{ github.event.client_payload.sha }}` |
            | Source repo | `${{ github.event.client_payload.repository }}` |

            Merging this PR triggers staging deploy via `deploy-staging.yml`.
          labels: |
            staging
            automated

      - name: Enable PR auto-merge
        if: steps.cpr.outputs.pull-request-number != ''
        uses: peter-evans/enable-pull-request-automerge@v3
        with:
          token: ${{ secrets.INFRA_PAT }}
          pull-request-number: ${{ steps.cpr.outputs.pull-request-number }}
          merge-method: squash
