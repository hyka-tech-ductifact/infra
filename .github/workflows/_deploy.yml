name: _Deploy Shared

on:
  workflow_call:
    inputs:
      environment:
        description: "Deploy environment"
        required: true
        type: string
      env_file_name:
        description: "Target env filename on server (example: .env.staging)"
        required: true
        type: string
      app_manifest_file_path:
        description: "Repository path to app image manifest file"
        required: true
        type: string
      config_file_path:
        description: "Repository path to environment config file"
        required: true
        type: string
    secrets:
      VPS_SSH_KEY:
        required: true
      CF_ACCESS_CLIENT_ID:
        required: true
      CF_ACCESS_CLIENT_SECRET:
        required: true
      VPS_USER:
        required: true
      VPS_HOST:
        required: true
      DB_PASSWORD:
        required: true
      JWT_SECRET:
        required: true
      MINIO_ROOT_USER:
        required: true
      MINIO_ROOT_PASSWORD:
        required: true
      SMTP_USERNAME:
        required: true
      SMTP_PASSWORD:
        required: true
      REDIS_PASSWORD:
        required: true

jobs:
  deploy:
    name: Deploy (${{ inputs.environment }})
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - uses: actions/checkout@v4

      - name: Install cloudflared
        run: |
          curl -fsSL https://github.com/cloudflare/cloudflared/releases/latest/download/cloudflared-linux-amd64.deb \
            -o /tmp/cloudflared.deb
          sudo dpkg -i /tmp/cloudflared.deb

      - name: Deploy to server
        run: |
          set -euo pipefail

          mkdir -p ~/.ssh
          echo "${{ secrets.VPS_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key

          CONFIG_FILE="${{ inputs.config_file_path }}"
          APP_MANIFEST_FILE="${{ inputs.app_manifest_file_path }}"
          SHARED_IMAGES_FILE="environments/images.manifest.env"
          ENV_TMP_FILE="/tmp/${{ inputs.env_file_name }}"

          if [[ ! -f "$CONFIG_FILE" ]]; then
            echo "ERROR: config file '$CONFIG_FILE' not found"
            exit 1
          fi

          if [[ ! -f "$APP_MANIFEST_FILE" ]]; then
            echo "ERROR: app manifest file '$APP_MANIFEST_FILE' not found"
            exit 1
          fi

          if [[ ! -f "$SHARED_IMAGES_FILE" ]]; then
            echo "ERROR: shared images file '$SHARED_IMAGES_FILE' not found"
            exit 1
          fi

          cp "$CONFIG_FILE" "$ENV_TMP_FILE"

          cat "$APP_MANIFEST_FILE" >> "$ENV_TMP_FILE"
          cat "$SHARED_IMAGES_FILE" >> "$ENV_TMP_FILE"

          sed -i "s|^DB_PASSWORD=.*|DB_PASSWORD=${{ secrets.DB_PASSWORD }}|" "$ENV_TMP_FILE"
          sed -i "s|^JWT_SECRET=.*|JWT_SECRET=${{ secrets.JWT_SECRET }}|" "$ENV_TMP_FILE"
          sed -i "s|^MINIO_ROOT_USER=.*|MINIO_ROOT_USER=${{ secrets.MINIO_ROOT_USER }}|" "$ENV_TMP_FILE"
          sed -i "s|^MINIO_ROOT_PASSWORD=.*|MINIO_ROOT_PASSWORD=${{ secrets.MINIO_ROOT_PASSWORD }}|" "$ENV_TMP_FILE"
          sed -i "s|^SMTP_USERNAME=.*|SMTP_USERNAME=${{ secrets.SMTP_USERNAME }}|" "$ENV_TMP_FILE"
          sed -i "s|^SMTP_PASSWORD=.*|SMTP_PASSWORD=${{ secrets.SMTP_PASSWORD }}|" "$ENV_TMP_FILE"
          sed -i "s|^REDIS_PASSWORD=.*|REDIS_PASSWORD=${{ secrets.REDIS_PASSWORD }}|" "$ENV_TMP_FILE"

          chmod 600 "$ENV_TMP_FILE"

          scp -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o "ProxyCommand=cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
              -i ~/.ssh/deploy_key \
              "$ENV_TMP_FILE" \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:~/ductifact/infra/${{ inputs.env_file_name }}

          ssh -o StrictHostKeyChecking=no \
              -o UserKnownHostsFile=/dev/null \
              -o "ProxyCommand=cloudflared access ssh --hostname %h --id ${{ secrets.CF_ACCESS_CLIENT_ID }} --secret ${{ secrets.CF_ACCESS_CLIENT_SECRET }}" \
              -i ~/.ssh/deploy_key \
              ${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }} \
              "cd ~/ductifact/infra && git pull --ff-only origin main && ./scripts/deploy.sh ${{ inputs.environment }}"

          rm -f "$ENV_TMP_FILE"
