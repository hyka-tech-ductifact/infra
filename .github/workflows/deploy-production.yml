name: Deploy Production

on:
  push:
    branches: [main]
    paths:
      - "environments/production.manifest.env"

concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    name: Deploy to Production
    environment: production
    uses: ./.github/workflows/_deploy.yml
    with:
      environment: prod
      env_file_name: .env.prod
      app_manifest_file_path: environments/production.manifest.env
      config_file_path: environments/production.config.env
    secrets: inherit

  publish-release:
    name: Publish Release
    runs-on: ubuntu-latest
    needs: deploy
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Read production manifest
        id: manifest
        run: |
          set -euo pipefail

          PROD_MANIFEST="environments/production.manifest.env"
          BACKEND_IMAGE=$(grep -E '^BACKEND_IMAGE=' "$PROD_MANIFEST" | cut -d'=' -f2-)
          FRONTEND_IMAGE=$(grep -E '^FRONTEND_IMAGE=' "$PROD_MANIFEST" | cut -d'=' -f2-)
          RELEASE_VERSION=$(grep -E '^RELEASE_VERSION=' "$PROD_MANIFEST" | cut -d'=' -f2-)

          if [[ -z "$BACKEND_IMAGE" || -z "$FRONTEND_IMAGE" || -z "$RELEASE_VERSION" ]]; then
            echo "ERROR: production manifest is missing required fields"
            exit 1
          fi

          if [[ ! "$RELEASE_VERSION" =~ ^v[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "ERROR: RELEASE_VERSION must match vX.Y.Z"
            exit 1
          fi

          if git show-ref --tags --verify --quiet "refs/tags/$RELEASE_VERSION"; then
            echo "ERROR: tag '$RELEASE_VERSION' already exists"
            exit 1
          fi

          echo "backend_image=$BACKEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "frontend_image=$FRONTEND_IMAGE" >> "$GITHUB_OUTPUT"
          echo "release_version=$RELEASE_VERSION" >> "$GITHUB_OUTPUT"

      - name: Create release tag
        run: |
          set -euo pipefail

          VERSION="${{ steps.manifest.outputs.release_version }}"

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git tag -a "$VERSION" -m "Production release $VERSION"
          git push origin "$VERSION"

      - name: Publish GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          VERSION="${{ steps.manifest.outputs.release_version }}"
          DEPLOYED_AT="$(date -u '+%Y-%m-%d %H:%M UTC')"

          cat > /tmp/release-notes.md <<EOF
          ## Production Deployment

          - Release: ${VERSION}
          - Environment: production
          - Deployed at: ${DEPLOYED_AT}
          - Commit: ${GITHUB_SHA}

          ### Application Images

          - Backend: ${{ steps.manifest.outputs.backend_image }}
          - Frontend: ${{ steps.manifest.outputs.frontend_image }}

          ### Source of Truth

          - Manifest: environments/production.manifest.env
          - Compose: docker-compose.yml
          EOF

          gh release create "$VERSION" \
            --title "$VERSION" \
            --notes-file /tmp/release-notes.md
