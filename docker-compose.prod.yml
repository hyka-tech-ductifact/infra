name: ductifact-prod

services:
  # ── PostgreSQL ─────────────────────────────────────────────
  postgres:
    image: postgres:15-alpine
    container_name: ductifact_prod_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${DB_USER}
      POSTGRES_PASSWORD: ${DB_PASSWORD}
      POSTGRES_DB: ${DB_NAME}
    volumes:
      - prod_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U ${DB_USER}" ]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - prod_internal

  # ── Backend API ────────────────────────────────────────────
  app:
    image: ghcr.io/${GITHUB_REPO}:latest
    container_name: ductifact_prod_app
    restart: unless-stopped
    ports:
      - "127.0.0.1:${APP_PORT}:${APP_PORT}"
    environment:
      - DB_HOST=postgres
      - DB_PORT=5432
      - DB_USER=${DB_USER}
      - DB_PASSWORD=${DB_PASSWORD}
      - DB_NAME=${DB_NAME}
      - APP_PORT=${APP_PORT}
      - JWT_SECRET=${JWT_SECRET}
      - CORS_ORIGINS=${CORS_ORIGINS}
      - LOG_LEVEL=${LOG_LEVEL}
      - LOG_FORMAT=${LOG_FORMAT}
      - GIN_MODE=${GIN_MODE}
      - AUTO_MIGRATE=${AUTO_MIGRATE}
    depends_on:
      postgres:
        condition: service_healthy
    networks:
      - prod_internal

  # ── Prometheus ─────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v3.3.0
    container_name: ductifact_prod_prometheus
    restart: unless-stopped
    volumes:
      - ./observability/prometheus/prometheus.prod.yml:/etc/prometheus/prometheus.yml:ro
      - ./observability/prometheus/alerts.yml:/etc/prometheus/alerts.yml:ro
      - prod_prometheus_data:/prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.retention.time=30d"
    networks:
      - prod_internal

  # ── Grafana ────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:11.6.0
    container_name: ductifact_prod_grafana
    restart: unless-stopped
    ports:
      - "127.0.0.1:3000:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=${GRAFANA_PASSWORD}
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - ./observability/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./observability/grafana/dashboards:/var/lib/grafana/dashboards:ro
      - prod_grafana_data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - prod_internal

volumes:
  prod_postgres_data:
  prod_prometheus_data:
  prod_grafana_data:


networks:
  prod_internal:
    driver: bridge
